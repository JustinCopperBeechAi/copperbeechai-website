<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copper Beech AI</title>
<style>
:root {
    --bg: #ffffff;
    --fg: #111111;
    --muted: #888888;
    --hover: #f0f0f0;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
}

body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px 64px;
}

.page {
    width: 100%;
    max-width: 425px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.logo {
    width: 220px;
    height: auto;
    display: block;
    margin: 0 0 36px;
}

h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin: 0 0 20px;
}

.strapline {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--muted);
    margin: 0 0 36px;
    max-width: 340px;
}

.divider {
    width: 32px;
    height: 1px;
    background: var(--fg);
    margin: 0 0 32px;
    opacity: 0.6;
}

.contact-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fg);
    margin: 0 0 14px;
}

a.email {
    display: inline-block;
    color: var(--fg);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    border: 1px solid var(--fg);
    padding: 12px 24px;
    transition: background 80ms, color 80ms;
}

a.email:hover {
    background: var(--fg);
    color: var(--bg);
}

footer {
    margin-top: 56px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.6;
}

.legal {
    position: fixed;
    bottom: 6px;
    left: 8px;
    font-size: 10px;
    color: #c8c8c8;
    letter-spacing: 0.3px;
    user-select: none;
    pointer-events: none;
    z-index: 1;
}
</style>
</head>
<body>
<div class="page">
    <img class="logo" src="brand_logo.png" alt="Copper Beech AI">
    <h1>Bespoke AI powered tools, built for professionals</h1>
    <p class="strapline">We build tools that streamline workflow and reduce burden on busy professionals.</p>
    <div class="divider"></div>
    <p class="contact-label">Get in touch</p>
    <a class="email" href="mailto:hello@copperbeechai.com">hello@copperbeechai.com</a>
</div>
<footer>&copy; 2026 Copper Beech AI Ltd</footer>
<div class="legal">© 2026 Copper Beech AI Ltd. All rights reserved.</div>
</body>
</html>
